<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form — Preview</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<style>
.contact-form {
    background: var(--color-bg-alt);
    padding: var(--spacing-3xl) var(--spacing-md);
}

.contact-form__container {
    max-width: var(--max-width-narrow);
    margin: 0 auto;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.7s ease, transform 0.7s ease;
}

.contact-form.is-visible .contact-form__container {
    opacity: 1;
    transform: translateY(0);
}

.contact-form__heading {
    font-family: var(--font-heading);
    font-weight: 300;
    font-size: clamp(1.5rem, 3vw, 2rem);
    color: var(--color-text);
    margin-bottom: var(--spacing-xl);
}

/* ── CF7 overrides (mirrored from contact-form.php) ───────── */

.contact-form .wpcf7 form > p {
    margin: 0 0 var(--spacing-lg);
}

.contact-form .wpcf7 form > p:last-of-type {
    margin-bottom: 0;
}

.contact-form .wpcf7 label {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    row-gap: var(--spacing-xs);
    font-family: var(--font-body);
    font-weight: 400;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--color-text-light);
}

.contact-form .wpcf7 label br {
    display: none;
}

.contact-form .wpcf7 .required {
    color: var(--color-error);
    margin-left: 0.15em;
}

.contact-form .wpcf7 .wpcf7-form-control-wrap {
    flex: 0 0 100%;
}

.contact-form .wpcf7 input[type="text"],
.contact-form .wpcf7 input[type="email"],
.contact-form .wpcf7 textarea {
    width: 100%;
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-sm);
    padding: 0.75rem 1rem;
    font-family: var(--font-body);
    font-size: 0.95rem;
    color: var(--color-text);
    transition: border-color 150ms ease, box-shadow 150ms ease;
    -webkit-appearance: none;
    appearance: none;
}

.contact-form .wpcf7 input[type="text"]:focus,
.contact-form .wpcf7 input[type="email"]:focus,
.contact-form .wpcf7 textarea:focus {
    outline: none;
    border-color: var(--color-km-blue);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--color-km-blue) 15%, transparent);
}

.contact-form .wpcf7 textarea {
    min-height: 160px;
    resize: vertical;
}

.contact-form .wpcf7 .form-bottom {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: var(--spacing-md);
    margin-top: var(--spacing-sm);
}

@media (min-width: 576px) {
    .contact-form .wpcf7 .form-bottom {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
    }
}

.contact-form .wpcf7 .form-bottom p {
    margin: 0;
}

.contact-form .wpcf7 input[type="submit"] {
    font-family: var(--font-body);
    font-weight: 400;
    font-size: 0.78rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--color-white);
    background: var(--color-navy-deep);
    border: none;
    border-radius: 1px;
    padding: 0.9rem 2.4rem;
    cursor: pointer;
    transition: background 300ms ease;
    -webkit-appearance: none;
    appearance: none;
}

.contact-form .wpcf7 input[type="submit"]:hover {
    background: var(--color-km-blue);
}

.contact-form .wpcf7 .wpcf7-spinner {
    display: none;
}
</style>

<section class="contact-form is-visible" data-section="contact-form">
    <div class="contact-form__container">

        <h2 class="contact-form__heading">Send a message</h2>

        <div class="wpcf7 js" dir="ltr">
        <form action="#" method="post" class="wpcf7-form init" aria-label="Contact form" novalidate="novalidate">
        <p><label>Name<span class="required">*</span><br>
        <span class="wpcf7-form-control-wrap" data-name="your-name"><input size="40" maxlength="400" class="wpcf7-form-control wpcf7-text wpcf7-validates-as-required" aria-required="true" aria-invalid="false" value="" type="text" name="your-name"></span></label>
        </p>
        <p><label>Email<span class="required">*</span><br>
        <span class="wpcf7-form-control-wrap" data-name="your-email"><input size="40" maxlength="400" class="wpcf7-form-control wpcf7-email wpcf7-validates-as-required wpcf7-text wpcf7-validates-as-email" aria-required="true" aria-invalid="false" value="" type="email" name="your-email"></span></label>
        </p>
        <p><label>Subject<br>
        <span class="wpcf7-form-control-wrap" data-name="your-subject"><input size="40" maxlength="400" class="wpcf7-form-control wpcf7-text" aria-invalid="false" value="" type="text" name="your-subject"></span></label>
        </p>
        <p><label>Message<br>
        <span class="wpcf7-form-control-wrap" data-name="your-message"><textarea cols="40" rows="10" maxlength="2000" class="wpcf7-form-control wpcf7-textarea" aria-invalid="false" name="your-message"></textarea></span></label>
        </p>
        <div class="form-bottom">
            <div>
                <p><input class="wpcf7-form-control wpcf7-submit" id="form-send" type="submit" value="Send"><span class="wpcf7-spinner"></span></p>
            </div>
            <div>
                <!-- Turnstile will appear here -->
            </div>
        </div>
        </form>
        </div>

    </div>
</section>

<script>
(function () {
    var section = document.querySelector('[data-section="contact-form"]');
    if (!section) return;

    var observer = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
            if (entry.isIntersecting) {
                section.classList.add('is-visible');
                observer.disconnect();
            }
        });
    }, { threshold: 0.15 });

    observer.observe(section);
})();
</script>

</body>
</html>
