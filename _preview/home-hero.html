<!-- Home Hero Section -->
<style>
body { background: var(--color-navy-deep); }

.home-hero {
    position: relative;
    width: 100%;
    height: 100vh;
    min-height: 700px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: linear-gradient(180deg, var(--color-navy-deep) 0%, #0d1e38 40%, #101f35 70%, #0e1c30 100%);
}
.home-hero__stars { position: absolute; inset: 0; pointer-events: none; }
.home-hero__star {
    position: absolute;
    background: var(--color-white);
    border-radius: 50%;
    opacity: 0;
    animation: home-hero-twinkle var(--duration) ease-in-out var(--delay) infinite;
}
@keyframes home-hero-twinkle {
    0%, 100% { opacity: 0; }
    50%       { opacity: var(--max-opacity); }
}
.home-hero__geometry {
    position: absolute; inset: 0; width: 100%; height: 100%;
    pointer-events: none; opacity: 0;
    animation: home-hero-geo-reveal 3s ease 0.8s forwards;
}
@keyframes home-hero-geo-reveal { from { opacity: 0; } to { opacity: 1; } }
.home-hero__content {
    position: relative; z-index: 10; text-align: center;
    display: flex; flex-direction: column; align-items: center;
    gap: 1.5rem; padding: 0 2rem; margin-top: -80px;
}
.home-hero__tagline {
    font-family: var(--font-body); font-weight: 200;
    font-size: clamp(0.7rem, 1.5vw, 0.85rem); letter-spacing: 0.5em;
    text-transform: uppercase; color: var(--color-slate-light);
    opacity: 0; animation: home-hero-fade-up 1s ease 0.9s forwards;
}
.home-hero__headline {
    font-family: var(--font-heading); font-weight: 300;
    font-size: clamp(2rem, 5vw, 3.2rem); color: var(--color-white);
    line-height: 1.2; max-width: 700px;
    opacity: 0; animation: home-hero-fade-up 1s ease 1.1s forwards;
}
.home-hero__headline em { font-style: italic; color: var(--color-slate-light); }
.home-hero__sub {
    font-family: var(--font-body); font-weight: 200;
    font-size: clamp(0.85rem, 1.5vw, 1rem); color: var(--color-white-dim);
    line-height: 1.8; max-width: 500px;
    opacity: 0; animation: home-hero-fade-up 1s ease 1.3s forwards;
}
.home-hero__ctas {
    display: flex; gap: 1.2rem; align-items: center; flex-wrap: wrap; justify-content: center;
    opacity: 0; animation: home-hero-fade-up 1s ease 1.5s forwards; margin-top: 0.5rem;
}
.home-hero__cta--primary {
    font-family: var(--font-body); font-weight: 300; font-size: 0.78rem;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--color-navy-deep); background: var(--color-slate-light);
    padding: 0.85rem 2rem; text-decoration: none;
    transition: background var(--transition-base); border-radius: 1px;
}
.home-hero__cta--primary:hover { background: var(--color-white); color: var(--color-navy-deep); }
.home-hero__cta--ghost {
    font-family: var(--font-body); font-weight: 300; font-size: 0.78rem;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--color-white-dim); background: none;
    border: 1px solid var(--color-white-faint); padding: 0.85rem 2rem;
    text-decoration: none; transition: border-color var(--transition-base), color var(--transition-base);
    border-radius: 1px;
}
.home-hero__cta--ghost:hover { border-color: var(--color-slate-light); color: var(--color-slate-light); }
@keyframes home-hero-fade-up {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
}
</style>

<section class="home-hero" data-section="home-hero">
    <div class="home-hero__stars" id="home-hero-stars"></div>

    <svg class="home-hero__geometry" id="home-hero-geometry" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
        <path id="home-hero-m-peaks" fill="none" stroke="var(--color-km-blue)" stroke-width="1"
            stroke-linecap="round" stroke-linejoin="round" opacity="0.35"
            d="M 100,660 L 420,140 L 700,420 L 980,140 L 1300,660"/>
        <line x1="100" y1="660" x2="1300" y2="660" stroke="var(--color-km-brown)" stroke-width="1" stroke-linecap="round" opacity="0.25"/>
        <line x1="700" y1="660" x2="100" y2="420" stroke="var(--color-km-green)" stroke-width="1" stroke-linecap="round" opacity="0.25"/>
        <line x1="700" y1="660" x2="1300" y2="420" stroke="var(--color-km-green)" stroke-width="1" stroke-linecap="round" opacity="0.25"/>
        <ellipse cx="700" cy="580" rx="90" ry="14" fill="none" stroke="var(--color-km-blue)" stroke-width="0.75" opacity="0.2"/>
    </svg>

    <div class="home-hero__content">
        <p class="home-hero__tagline">iOS Apps &nbsp;·&nbsp; AI-Powered &nbsp;·&nbsp; Contract Work</p>
        <h1 class="home-hero__headline">Software that does exactly what you need — <em>nothing more.</em></h1>
        <p class="home-hero__sub">We build apps grounded in simplicity and privacy, using the best AI tools available. No bloat, no tracking, no noise.</p>
        <div class="home-hero__ctas">
            <a href="#" class="home-hero__cta--primary">Our Apps</a>
            <a href="#" class="home-hero__cta--ghost">Get In Touch</a>
        </div>
    </div>
</section>

<script>
(function () {
    var section   = document.querySelector('[data-section="home-hero"]');
    var container = document.getElementById('home-hero-stars');
    var mPath     = document.getElementById('home-hero-m-peaks');
    var h1El      = section.querySelector('.home-hero__headline');

    if (!section || !container || !mPath || !h1El) return;

    var heroRect  = section.getBoundingClientRect();
    var totalLen  = mPath.getTotalLength();
    var svgEl     = mPath.ownerSVGElement;
    var widthPx   = Math.ceil(heroRect.width);
    var boundaryMap = new Float32Array(widthPx).fill(heroRect.height);

    for (var i = 0; i <= 600; i++) {
        var pt    = mPath.getPointAtLength((i / 600) * totalLen);
        var svgPt = svgEl.createSVGPoint();
        svgPt.x = pt.x; svgPt.y = pt.y;
        var screenPt = svgPt.matrixTransform(mPath.getScreenCTM());
        var px = Math.round(screenPt.x - heroRect.left);
        var py = screenPt.y - heroRect.top;
        if (px >= 0 && px < widthPx) boundaryMap[px] = Math.min(boundaryMap[px], py);
    }

    var lastValid = -1;
    for (var x = 0; x < widthPx; x++) {
        if (boundaryMap[x] < heroRect.height) {
            if (lastValid >= 0 && x - lastValid > 1) {
                var yS = boundaryMap[lastValid], yE = boundaryMap[x];
                for (var f = lastValid + 1; f < x; f++) {
                    boundaryMap[f] = yS + ((f - lastValid) / (x - lastValid)) * (yE - yS);
                }
            }
            lastValid = x;
        }
    }

    var h1Bottom = h1El.getBoundingClientRect().bottom - heroRect.top;
    var placed = 0, attempts = 0;

    while (placed < 120 && attempts < 1200) {
        attempts++;
        var xPx = Math.random() * heroRect.width;
        var yPx = Math.random() * heroRect.height;
        if (yPx >= h1Bottom) continue;
        var idx      = Math.round(xPx);
        var boundary = (idx >= 0 && idx < boundaryMap.length) ? boundaryMap[idx] : heroRect.height;
        if (yPx >= boundary - 8) continue;

        var star = document.createElement('div');
        star.className = 'home-hero__star';
        var size = Math.random() * 2 + 0.5;
        star.style.cssText = [
            'width:' + size + 'px', 'height:' + size + 'px',
            'top:' + ((yPx / heroRect.height) * 100) + '%',
            'left:' + ((xPx / heroRect.width) * 100) + '%',
            '--duration:' + (Math.random() * 4 + 3) + 's',
            '--delay:' + (Math.random() * 6) + 's',
            '--max-opacity:' + (Math.random() * 0.6 + 0.2),
        ].join(';');
        container.appendChild(star);
        placed++;
    }
})();
</script>
