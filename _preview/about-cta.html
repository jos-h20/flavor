<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About CTA — Preview</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<style>
.about-cta {
    position: relative;
    overflow: hidden;
    background: linear-gradient(180deg, var(--color-navy-deep) 0%, #0d1e38 100%);
    padding: var(--spacing-3xl) var(--spacing-md);
}

.about-cta__geometry {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

.about-cta__container {
    position: relative;
    z-index: 10;
    max-width: var(--max-width-narrow);
    margin: 0 auto;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--spacing-lg);
}

.about-cta__heading {
    font-family: var(--font-heading);
    font-weight: 300;
    font-size: clamp(1.8rem, 4vw, 3rem);
    color: var(--color-white);
}

.about-cta__subheading {
    font-family: var(--font-body);
    font-weight: 200;
    font-size: clamp(0.9rem, 1.5vw, 1rem);
    color: var(--color-white-dim);
    line-height: 1.8;
    max-width: 480px;
    margin-bottom: 0;
}

.about-cta__button {
    font-family: var(--font-body);
    font-weight: 400;
    font-size: 0.78rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--color-navy-deep);
    background: var(--color-slate-light);
    padding: 0.9rem 2.4rem;
    text-decoration: none;
    border-radius: 1px;
    transition: background var(--transition-base), color var(--transition-base);
}

.about-cta__button:hover {
    background: var(--color-white);
    color: var(--color-navy-deep);
}
</style>

<section class="about-cta" data-section="about-cta">

    <svg class="about-cta__geometry" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
        <line x1="100" y1="390" x2="1100" y2="390"
            stroke="var(--color-km-brown)" stroke-width="0.75" stroke-linecap="round" opacity="0.25"/>
        <line x1="100" y1="390" x2="460" y2="140"
            stroke="var(--color-km-blue)" stroke-width="0.75" stroke-linecap="round" opacity="0.25"/>
        <line x1="1100" y1="390" x2="740" y2="140"
            stroke="var(--color-km-blue)" stroke-width="0.75" stroke-linecap="round" opacity="0.25"/>
        <line x1="460" y1="140" x2="740" y2="140"
            stroke="var(--color-km-brown)" stroke-width="0.75" stroke-linecap="round" opacity="0.2"/>
        <ellipse cx="600" cy="345" rx="65" ry="10"
            fill="none" stroke="var(--color-km-green)" stroke-width="0.75" opacity="0.2"/>
    </svg>

    <div class="about-cta__container">
        <h2 class="about-cta__heading">Let's build something worth building.</h2>
        <p class="about-cta__subheading">I take on a small number of projects each year — enough to do each one properly. If you have something in mind, I'd like to hear about it.</p>
        <a href="#" class="about-cta__button">Start a Conversation</a>
    </div>

</section>

</body>
</html>
