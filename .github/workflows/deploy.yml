name: Deploy Flavor Theme
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Deploy via Rsync
        uses: Burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude='.git/' --exclude='.github/' --exclude='.gitignore' --exclude='node_modules/' --exclude='_preview/' --exclude='CLAUDE.md'
          path: ./
          remote_path: /var/www/kansomedia/wp-content/themes/flavor/
          remote_host: ${{ secrets.REMOTE_HOST }}
          remote_port: ${{ secrets.REMOTE_PORT }}
          remote_user: ${{ secrets.REMOTE_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Re-enable Redis Object Cache
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.REMOTE_HOST }}
          port: ${{ secrets.REMOTE_PORT }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/kansomedia
            wp redis enable 2>&1 || echo "WARNING: wp redis enable failed"
            sudo rm -rf /var/run/nginx-cache/* 2>&1 || echo "WARNING: cache purge failed"
